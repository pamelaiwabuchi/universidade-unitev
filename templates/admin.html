<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Painel Administrativo - UniTeV</title>
</head>
<body class="bg-gray-100 p-10">
    <h1 class="text-2xl font-bold mb-6">Contatos recebidos</h1>
    <div class="bg-white p-6 rounded shadow">
        <table class="w-full text-left">
            <thead>
                <tr class="border-b">
                    <th class="py-2">Nome</th>
                    <th class="py-2">Email</th>
                    <th class="py-2">Sugestão</th>
                </tr>
            </thead>
            <tbody>
                <tr class="border-b">
                    <td class="py-2">{{ item.nome }}</td>
                    <td class="py-2">{{ item.email }}</td>
                    <td class="py-2">{{ item.sugestao }}</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
